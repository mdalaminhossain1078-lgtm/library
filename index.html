<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>নন্দলালপুর বায়তুল ইলম ইসলামিক পাঠাগার</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind Siliguri',sans-serif;background:#f5fbf7;color:#1a2e1e;max-width:480px;margin:0 auto;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,.15)}
button{font-family:'Hind Siliguri',sans-serif;cursor:pointer}
input,textarea{font-family:'Hind Siliguri',sans-serif}
::-webkit-scrollbar{display:none}

.header{background:linear-gradient(135deg,#0f4a27,#1a6b3a,#2d8f52);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,74,39,.3)}
.topbar{background:rgba(0,0,0,.2);padding:4px 12px;display:flex;align-items:center;justify-content:space-between;font-size:10px}
.arabic{font-size:13px;color:#c8a84b;font-family:serif;text-align:center;flex:1}
.stars{color:#c8a84b;letter-spacing:4px}
.header-main{padding:8px 12px 5px;display:flex;align-items:center;gap:10px}
.logo{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.lib-name-sm{font-size:10px;color:rgba(255,255,255,.65);margin-bottom:1px}
.lib-name{font-size:13px;font-weight:700;color:#fff;line-height:1.3}
.tagline{font-size:10px;color:rgba(255,255,255,.8);font-style:italic;margin-top:1px}
.topnav{display:flex;overflow-x:auto;background:rgba(0,0,0,.15);padding:2px 0;scrollbar-width:none}
.topnav button{flex:0 0 auto;padding:5px 10px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.7);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;white-space:nowrap}
.topnav button.active{color:#fff;font-weight:700;border-bottom:2px solid #c8a84b;background:rgba(255,255,255,.08)}
.topnav button .ni{font-size:14px}
.topnav button .nl{font-size:9px}
.page{min-height:calc(100vh - 200px);padding-bottom:20px}
.hero{background:linear-gradient(160deg,#0f4a27,#1a6b3a);padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden}
.hero-pat{position:absolute;top:0;left:0;right:0;bottom:0;opacity:.05;background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);background-size:20px 20px}
.hero h1{font-size:18px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:6px;position:relative}
.hero-sub{font-size:12px;color:rgba(255,255,255,.8);position:relative}
.hero-btns{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap;position:relative}
.hb{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:9px 14px;border-radius:10px;font-size:12px;font-weight:600}
.hbg{background:#c8a84b;border:1.5px solid #c8a84b;color:#1a2e1e;padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 14px}
.card{background:#fff;border-radius:14px;padding:16px 10px;text-align:center;box-shadow:0 2px 10px rgba(26,107,58,.10);border:1.5px solid #c3e6cb;cursor:pointer}
.card:active{transform:scale(.97);background:#f0faf4}
.card-icon{font-size:26px;margin-bottom:6px;display:block}
.card-label{font-size:12px;font-weight:600;color:#0f4a27;line-height:1.3}
.sec-title{font-size:17px;font-weight:700;color:#0f4a27;text-align:center;padding:18px 16px 8px;border-bottom:2px solid #c3e6cb;margin:0 14px 14px}
.sec-box{background:#fff;margin:0 14px 14px;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(26,107,58,.08);border:1.5px solid #c3e6cb}
.sec-text{font-size:13px;line-height:1.8;color:#4a6b54;margin-bottom:10px}
.quote{background:#f0faf4;border:1.5px solid #c3e6cb;border-left:4px solid #1a6b3a;border-radius:8px;padding:11px 13px;font-size:13px;font-style:italic;color:#0f4a27;font-weight:600;text-align:center;margin:8px 0 0}
.divider{text-align:center;color:#1a6b3a;font-size:16px;margin:8px 0;letter-spacing:6px}
.goal-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #c3e6cb;font-size:13px;color:#4a6b54;line-height:1.6}
.gnum{background:#1a6b3a;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* COMMITTEE */
.comm-title{font-size:13px;font-weight:700;color:#1a6b3a;padding:10px 0 6px;border-bottom:1px dashed #c3e6cb;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.ctag{background:#e8f5e9;color:#1a6b3a;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;margin-left:6px;border:1px solid #c3e6cb}
.add-btn{background:#1a6b3a;color:#fff;border:none;border-radius:7px;padding:4px 10px;font-size:11px}
.mc{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:#f0faf4;border-radius:10px;margin-bottom:7px;border:1px solid #c3e6cb}
.mn{font-size:13px;font-weight:600;color:#1a2e1e}
.mr{font-size:11px;color:#4a6b54;margin-top:2px}
.eb{background:#1a6b3a;color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:11px}
.db{background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:4px 7px;font-size:11px;margin-left:5px}
.ei{padding:5px 8px;border-radius:6px;border:1.5px solid #c3e6cb;font-size:12px;width:140px;font-family:'Hind Siliguri',sans-serif;background:#fff}
.cb{background:#1a6b3a;color:#fff;border:none;border-radius:6px;padding:5px 9px;font-size:12px}
.xb{background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:5px 9px;font-size:12px}

/* DONOR BOX */
.donor-box{background:linear-gradient(135deg,#f0faf4,#e8f5e9);border:2px solid #1a6b3a;border-radius:12px;padding:14px;margin-bottom:14px}
.donor-rule{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #c3e6cb;font-size:13px;line-height:1.6}
.donor-ben{background:#fff3cd;border:1.5px solid #c8a84b;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px;color:#7d5a00;line-height:1.6}

/* BOOKS */
.book-cat{display:flex;align-items:center;gap:12px;padding:13px 14px;background:#fff;border-radius:12px;margin-bottom:9px;border:1.5px solid #c3e6cb;box-shadow:0 1px 6px rgba(26,107,58,.07);cursor:pointer}
.book-cat:active{background:#f0faf4}
.bclabel{font-size:13px;font-weight:600;color:#0f4a27;flex:1}
.bcount{background:#1a6b3a;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}

/* BOOK LIST PAGE */
.book-item{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:#fff;border-radius:11px;margin-bottom:8px;border:1.5px solid #c3e6cb}
.book-name{font-size:13px;font-weight:600;color:#1a2e1e;flex:1;margin:0 8px}
.book-num{background:#e8f5e9;color:#1a6b3a;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;border:1px solid #c3e6cb;white-space:nowrap}

/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g-album{background:#fff;border-radius:12px;padding:12px;border:1.5px solid #c3e6cb;cursor:pointer;position:relative}
.g-thumb{width:100%;height:90px;border-radius:8px;background:linear-gradient(135deg,rgba(26,107,58,.15),rgba(45,143,82,.1));display:flex;align-items:center;justify-content:center;font-size:32px;border:1px solid #c3e6cb;margin-bottom:8px;overflow:hidden}
.g-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.g-title{font-size:12px;font-weight:600;color:#0f4a27;text-align:center}
.g-count{font-size:11px;color:#4a6b54;text-align:center;margin-top:2px}
.g-del{position:absolute;top:6px;right:6px;background:#e74c3c;color:#fff;border:none;border-radius:5px;padding:2px 6px;font-size:10px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.photo-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(231,76,60,.85);color:#fff;border:none;border-radius:4px;padding:1px 5px;font-size:10px}
.add-photo{aspect-ratio:1;border-radius:8px;border:2px dashed #c3e6cb;background:#f0faf4;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#1a6b3a;gap:4px}
.add-photo span:first-child{font-size:24px}

/* FAQ */
.faq-item{background:#fff;border-radius:12px;margin-bottom:9px;border:1.5px solid #c3e6cb;overflow:hidden}
.faq-q{padding:13px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:#0f4a27;user-select:none}
.faq-a{padding:10px 14px 13px;font-size:12px;color:#4a6b54;line-height:1.7;border-top:1px solid #c3e6cb;display:none}
.faq-a.open{display:block}

/* FORM */
.fg{margin-bottom:13px}
.fl{display:block;font-size:12px;font-weight:600;color:#0f4a27;margin-bottom:5px}
input.fi,textarea.fi{width:100%;padding:9px 11px;border-radius:9px;border:1.5px solid #c3e6cb;font-size:13px;color:#1a2e1e;background:#f0faf4;outline:none}
textarea.fi{min-height:85px;resize:vertical}
.sbtn{background:linear-gradient(135deg,#1a6b3a,#2d8f52);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-size:13px;font-weight:700;width:100%;margin-top:4px;box-shadow:0 3px 10px rgba(26,107,58,.3)}
.rl{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;border:1.5px solid #c3e6cb;cursor:pointer;font-size:13px;background:#f0faf4;margin-bottom:7px}

/* CONTACT */
.cr{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #c3e6cb}
.ci{width:36px;height:36px;border-radius:9px;background:#f0faf4;border:1.5px solid #c3e6cb;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

/* NOTICE */
.nc{background:#fff;border-radius:12px;padding:13px;margin-bottom:9px;border:1.5px solid #c3e6cb;border-left:4px solid #1a6b3a}
.badge{background:#f0faf4;border:1.5px solid #c3e6cb;border-radius:8px;padding:11px 13px;font-size:13px;color:#0f4a27;line-height:1.7;margin-bottom:9px;display:flex;align-items:flex-start;gap:10px}
.bnum{background:#1a6b3a;color:#fff;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.mr{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #c3e6cb;font-size:13px;color:#4a6b54;line-height:1.6}
.const-box{background:#fff;border-radius:12px;padding:14px;margin:0 14px 14px;border:1.5px solid #c3e6cb}
.const-t{font-size:14px;font-weight:700;color:#0f4a27;margin-bottom:8px;border-bottom:1.5px solid #c3e6cb;padding-bottom:7px}
.const-b{font-size:12px;color:#4a6b54;line-height:1.9}
.succ{text-align:center;padding:22px 0}

/* FOOTER */
footer{background:linear-gradient(135deg,#0f4a27,#1a6b3a);padding:16px 14px 10px;text-align:center}
.fq{font-size:13px;font-style:italic;margin-bottom:8px;color:#c8a84b}
.fl2{display:flex;justify-content:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;font-size:11px;color:rgba(255,255,255,.8)}
.fc{font-size:10px;color:rgba(255,255,255,.5);margin-top:5px}

/* BOTTOM NAV */

</style>
</head>
<body>

<div class="header">
  <div class="topbar">
    <span class="stars">✦ ✦ ✦</span>
    <span class="arabic">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</span>
    <span class="stars">✦ ✦ ✦</span>
  </div>
  <div class="header-main">
    <div class="logo">🌿</div>
    <div>

      <div class="lib-name">নন্দলালপুর বায়তুল ইলম ইসলামিক পাঠাগার</div>
      <div class="tagline">"এসো বই পড়ি, নিজেকে আলোকিত করি" 📚</div>
    </div>
  </div>
  <div class="topnav" id="topnav"></div>
</div>

<div id="app"></div>


<script>
const NAV=[
  {id:'home',label:'হোম',icon:'🏠'},
  {id:'about',label:'আমাদের সম্পর্কে',icon:'📚'},
  {id:'goals',label:'লক্ষ্য ও উদ্দেশ্য',icon:'🎯'},
  {id:'constitution',label:'সংবিধান',icon:'📜'},
  {id:'committee',label:'কমিটি',icon:'👥'},
  {id:'books',label:'বইয়ের তালিকা',icon:'📖'},
  {id:'gallery',label:'গ্যালারি',icon:'📸'},
  {id:'faq',label:'প্রশ্নোত্তর',icon:'❓'},
  {id:'membership',label:'সদস্য হন',icon:'📝'},
  {id:'cancel',label:'সদস্যপদ বাতিল',icon:'🚫'},
  {id:'feedback',label:'মতামত',icon:'🌟'},
  {id:'support',label:'সহযোগিতা',icon:'🤝'},
  {id:'contact',label:'যোগাযোগ',icon:'📞'},
  {id:'notice',label:'নোটিশ বোর্ড',icon:'📋'},
];

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let pg=ls('pg','home');
let faqOpen=null;
let sType='বই';
let fbDone=false,spDone=false,addN=false;
let curAlbum=null;
let curBook=null; // {catIndex}
let editM=null; // {sec,id}

// BOOKS DATA
let booksData=ls('booksData',[
  {icon:'📗',label:'ইসলামিক বই',books:['কুরআনের তাফসীর','হাদিসের আলো','ইসলামী আকিদা','ফিকহুল ইবাদত','সীরাতুন নবী']},
  {icon:'📘',label:'উপন্যাস',books:['পথের দাবী','চাঁদের আলোয়','নীল নদীর কূলে','স্বপ্নের বাগান']},
  {icon:'📙',label:'বিজ্ঞান ও প্রযুক্তি',books:['বিজ্ঞানের জগৎ','প্রযুক্তি ও ভবিষ্যৎ','মহাকাশের রহস্য']},
  {icon:'📕',label:'ইতিহাস',books:['বাংলাদেশের ইতিহাস','মুঘল সাম্রাজ্য','ইসলামের ইতিহাস']},
  {icon:'📔',label:'আত্মউন্নয়নমূলক বই',books:['সাফল্যের সূত্র','মনের শক্তি','জীবন গড়ার পথ']},
  {icon:'📒',label:'শিশুদের বই',books:['ছোটদের গল্প','রঙিন পৃথিবী','নতুন বন্ধু']},
  {icon:'📚',label:'সাধারণ জ্ঞান',books:['বিশ্বকোষ','জানার আনন্দ','প্রশ্নোত্তর সমগ্র']},
  {icon:'🧠',label:'শিক্ষামূলক বই',books:['গণিতের মজা','বাংলা ব্যাকরণ','ইংরেজি শিক্ষা']},
  {icon:'🌿',label:'অনুপ্রেরণামূলক বই',books:['স্বপ্ন দেখো','এগিয়ে চলো','আলোর পথে']},
]);

let committee=ls('committee',{
  advisors:Array.from({length:5},(_,i)=>({id:'a'+i,name:'',role:'উপদেষ্টা'})),
  executive:[{id:'e0',name:'',role:'সভাপতি'},{id:'e1',name:'',role:'সহ-সভাপতি'},{id:'e2',name:'',role:'সাধারণ সম্পাদক'},{id:'e3',name:'',role:'সাংগঠনিক সম্পাদক'},{id:'e4',name:'',role:'অর্থ সম্পাদক'},{id:'e5',name:'',role:'প্রচার সম্পাদক'}],
  donors:Array.from({length:9},(_,i)=>({id:'d'+i,name:'',role:'দাতা সদস্য'})),
  special:Array.from({length:10},(_,i)=>({id:'s'+i,name:'',role:'বিশেষ সদস্য'})),
  general:[],
});

let notices=ls('notices',[{id:1,subject:'পাঠাগার উদ্বোধন',comment:'আগামী শুক্রবার আনুষ্ঠানিক উদ্বোধন হবে।',time:'২৩ মে ২০২৬'}]);
let albums=ls('albums',[{id:1,title:'পাঠচক্র ২০২৬',photos:[]},{id:2,title:'বই বিতরণ অনুষ্ঠান',photos:[]},{id:3,title:'শিক্ষামূলক আয়োজন',photos:[]}]);

function nav(id){pg=id;faqOpen=null;fbDone=false;spDone=false;addN=false;curAlbum=null;curBook=null;editM=null;ss('pg',id);render();window.scrollTo({top:0,behavior:'smooth'});}

function renderNav(){
  const tn=document.getElementById('topnav');

  tn.innerHTML=NAV.map(n=>`<button class="${pg===n.id?'active':''}" onclick="nav('${n.id}')"><span class="ni">${n.icon}</span><span class="nl">${n.label}</span></button>`).join('');

}

function footer(){
  const navLinks = NAV.map(n=>`<span onclick="nav('${n.id}')" style="cursor:pointer;color:rgba(255,255,255,.85);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 6px;border-radius:8px;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.background='transparent'"><span style="font-size:16px">${n.icon}</span><span>${n.label}</span></span>`).join('');
  return `<div class="divider">🌿</div><footer>
  <div class="fq">"জ্ঞান অর্জন করুন, জীবন গড়ুন।" 📚✨</div>
  <div class="fl2"><span>🌐 Facebook</span><span>💬 WhatsApp</span><span>📱 01739501078</span><span>📍 নন্দলালপুর, শাহজাদপুর, সিরাজগঞ্জ</span></div>
  <div class="fc" style="margin-bottom:12px">© ২০২৬ নন্দলালপুর বায়তুল ইলম ইসলামিক পাঠাগার</div>
  <div style="border-top:1px solid rgba(255,255,255,.15);padding-top:12px;margin-top:4px">
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px 4px">
      ${navLinks}
    </div>
  </div>
  </footer>`;
}

// HOME
function pageHome(){

          <div class="g-thumb">${a.photos.length>0?`<img src="${a.photos[0].src}" alt="">`:'🖼️'}</div>

function triggerPhoto(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.multiple=true;
  input.style.display='none';
  document.body.appendChild(input);
  input.onchange=function(){
    const files=Array.from(this.files);
    let loaded=0;
    files.forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>{
        const a=albums.find(x=>x.id===curAlbum);
        if(a){
          a.photos.push({id:Date.now()+Math.random(),src:ev.target.result});
          loaded++;
          if(loaded===files.length){ss('albums',albums);render();}
        }
      };
      r.readAsDataURL(file);
    });
    document.body.removeChild(input);
  };
  input.click();
}

function addPhotos(e,aid){
  const files=Array.from(e.target.files);
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=ev=>{
      const a=albums.find(x=>x.id===aid);
      if(a){a.photos.push({id:Date.now()+Math.random(),src:ev.target.result});ss('albums',albums);render();}
    };
    r.readAsDataURL(file);
  });
}
